name: Build and Publish Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag a publicar (ejemplo: 1.0 o v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install WiX Toolset v3
        shell: powershell
        run: |
          choco install wixtoolset -y --no-progress
          $wixPath = "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $wixPath
          }
          light.exe -?

      - name: Build EXE installer with Maven profile
        run: mvn -B -DskipTests package -Pwindows-installer

      - name: List generated artifacts
        shell: powershell
        run: |
          Write-Host "Installer directory:"
          if (Test-Path target/installer) {
            Get-ChildItem -Path target/installer -Recurse | Format-Table -AutoSize
          } else {
            Write-Host "target/installer not found"
          }
          Write-Host "Target directory:"
          Get-ChildItem -Path target | Format-Table -AutoSize

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            target/installer/*.exe
            target/*.jar

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          append_body: true
          files: |
            target/installer/*.exe
            target/*.jar
          overwrite_files: true
          fail_on_unmatched_files: true
